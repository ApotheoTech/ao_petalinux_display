<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .card{fill:#fafafa;stroke:#334155;stroke-width:2;}
      .p1{fill:#f8fafc;stroke:#64748b;stroke-width:1.6;}
      .p2{fill:#f8fafc;stroke:#64748b;stroke-width:1.6;}
      .common{fill:#f1f5f9;stroke:#475569;stroke-width:1.4;}
      .a{fill:#e6f2ff;stroke:#3b82f6;stroke-width:1.4;}
      .b{fill:#e8f8ee;stroke:#16a34a;stroke-width:1.4;}
      .hdr{fill:#0f172a;font-size:15px;font-weight:700;}
      .sub{fill:#475569;font-size:12px;}
      .t{fill:#0f172a;font-size:13px;}
      .tmono{fill:#0f172a;font-size:12.5px;font-family:Consolas,Menlo,monospace;}
      .tag{font-size:11.5px;font-weight:700;}
      .taga{fill:#1d4ed8;}
      .tagb{fill:#15803d;}
      .del{fill:#b91c1c;font-size:11px;}
    </style>
  </defs>

  <!-- card outline -->
  <rect class="card" x="20" y="20" width="880" height="480" rx="16"/>
  <path d="M20,60 L20,36 Q20,20 36,20 L120,20 L120,60 Z" fill="#e2e8f0" stroke="#334155" stroke-width="2"/>
  <text class="hdr" x="140" y="48">microSD — flashed with Ubuntu 24.04</text>

  <!-- p1 FAT -->
  <rect class="p1" x="44" y="78" width="404" height="398" rx="10"/>
  <text class="hdr" x="64" y="108">p1 · FAT32</text>
  <text class="sub" x="64" y="127">/boot/firmware</text>

  <rect class="common" x="64" y="142" width="364" height="64" rx="8"/>
  <text class="t" x="80" y="164" font-weight="700">Both options</text>
  <text class="tmono" x="80" y="184">BOOT.BIN</text>
  <text class="tmono" x="80" y="200">user-override.dtb</text>

  <rect class="a" x="64" y="220" width="364" height="74" rx="8"/>
  <text class="tag taga" x="80" y="242">OPTION A — keep Ubuntu's stock files</text>
  <text class="tmono" x="80" y="262">boot.scr.uimg  (stock)</text>
  <text class="tmono" x="80" y="280">image.fit      (stock)</text>

  <rect class="b" x="64" y="308" width="364" height="150" rx="8"/>
  <text class="tag tagb" x="80" y="330">OPTION B — use your own files</text>
  <text class="tmono" x="80" y="350">Image            (vendor kernel)</text>
  <text class="tmono" x="80" y="368">boot.scr.uimg    (compiled from boot.cmd)</text>
  <text class="tmono" x="80" y="386">user-override.dtb</text>
  <text class="tmono" x="80" y="404">BOOT.BIN</text>
  <text class="del" x="80" y="428">✗ delete stock image.fit</text>
  <text class="del" x="80" y="444">✗ delete stock boot.scr.uimg</text>

  <!-- p2 ext4 -->
  <rect class="p2" x="472" y="78" width="404" height="398" rx="10"/>
  <text class="hdr" x="492" y="108">p2 · ext4</text>
  <text class="sub" x="492" y="127">LABEL=writable</text>

  <rect class="common" x="492" y="142" width="364" height="120" rx="8"/>
  <text class="t" x="508" y="164" font-weight="700">Both options</text>
  <text class="t" x="508" y="186">Ubuntu 24.04 rootfs</text>
  <text class="sub" x="508" y="208">desktop · apt · snaps · userspace</text>
  <text class="sub" x="508" y="232">(this is what makes it "Ubuntu";</text>
  <text class="sub" x="508" y="248">the kernel comes from p1)</text>

  <rect class="b" x="492" y="276" width="364" height="92" rx="8"/>
  <text class="tag tagb" x="508" y="298">OPTION B — inject vendor modules</text>
  <text class="tmono" x="508" y="320">lib/modules/&lt;KVER&gt;</text>
  <text class="sub" x="508" y="342">cp -a from the PetaLinux rootfs.tar.gz,</text>
  <text class="sub" x="508" y="358">then chroot depmod &lt;KVER&gt;</text>

  <text class="sub" x="492" y="404" font-size="11.5">Kernel + DTB live on p1; userspace lives on p2.</text>
  <text class="sub" x="492" y="424" font-size="11.5">Option B = your kernel (p1) over Ubuntu's rootfs (p2).</text>

  <text class="sub" x="48" y="498" font-size="11">Blue = Option A · Green = Option B</text>
</svg>
