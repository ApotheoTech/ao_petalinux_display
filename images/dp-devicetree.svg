<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="dot" markerWidth="8" markerHeight="8" refX="4" refY="4">
      <circle cx="4" cy="4" r="3" fill="#0891b2"/>
    </marker>
    <style>
      .node{fill:#eef2ff;stroke:#4f46e5;stroke-width:1.6;}
      .gen{fill:#f1f5f9;stroke:#475569;stroke-width:1.4;}
      .add{fill:#dcfce7;stroke:#15803d;stroke-width:1.8;}
      .clk{fill:#fef9c3;stroke:#ca8a04;stroke-width:1.6;}
      .title{fill:#0f172a;font-size:14px;font-weight:700;text-anchor:middle;}
      .mono{fill:#0f172a;font-size:12px;font-family:Consolas,Menlo,monospace;text-anchor:middle;}
      .monos{fill:#475569;font-size:11px;font-family:Consolas,Menlo,monospace;text-anchor:middle;}
      .tag{font-size:10.5px;font-weight:700;text-anchor:middle;}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;}
      .link{stroke:#0891b2;stroke-width:2;fill:none;stroke-dasharray:5 4;}
      .cap{fill:#475569;font-size:11px;}
    </style>
  </defs>

  <text x="30" y="30" font-size="15" font-weight="700" fill="#0f172a">DisplayPort device tree — what you add in system-user.dtsi (§5)</text>

  <!-- DPSUB (generated, you add port@5) -->
  <rect class="gen" x="40" y="70" width="330" height="150" rx="10"/>
  <text class="title" x="205" y="94">&amp;zynqmp_dpsub</text>
  <text class="monos" x="205" y="113">(generated from PS config)</text>
  <rect class="add" x="70" y="128" width="270" height="74" rx="8"/>
  <text class="tag" x="205" y="148" fill="#15803d">YOU ADD — ports / port@5</text>
  <text class="mono" x="205" y="170">port@5 { reg = &lt;5&gt;;</text>
  <text class="mono" x="205" y="188">  dpsub_dp_out: endpoint; }</text>

  <!-- DPCON (you add) -->
  <rect class="add" x="490" y="70" width="330" height="150" rx="10"/>
  <text class="tag" x="655" y="92" fill="#15803d">YOU ADD — physical connector</text>
  <text class="title" x="655" y="114">dpcon</text>
  <text class="monos" x="655" y="133">compatible = "dp-connector"</text>
  <rect class="gen" x="520" y="146" width="270" height="56" rx="8" fill="#ecfeff" stroke="#0891b2"/>
  <text class="mono" x="655" y="170">port { dpcon_in: endpoint</text>
  <text class="mono" x="655" y="188">  remote-endpoint } </text>

  <!-- OF-graph link between endpoints -->
  <path class="link" d="M340,165 C410,165 420,165 520,174" marker-start="url(#dot)" marker-end="url(#dot)"/>
  <text class="cap" x="430" y="150" text-anchor="middle" fill="#0891b2" font-weight="700">remote-endpoint</text>
  <text class="cap" x="430" y="205" text-anchor="middle">dpsub_dp_out ↔ dpcon_in</text>

  <!-- PSGTR + refclk -->
  <rect class="gen" x="40" y="270" width="330" height="120" rx="10"/>
  <text class="title" x="205" y="294">&amp;psgtr</text>
  <text class="monos" x="205" y="313">(DP lanes 0/1 — generated)</text>
  <rect class="add" x="70" y="326" width="270" height="50" rx="8"/>
  <text class="tag" x="205" y="345" fill="#15803d">YOU ADD — the missing ref clock</text>
  <text class="mono" x="205" y="366">clocks=&lt;&amp;dp_gt_refclk&gt;; "ref0"</text>

  <rect class="clk" x="490" y="290" width="330" height="80" rx="10"/>
  <text class="title" x="655" y="316">dp_gt_refclk  (fixed-clock)</text>
  <text class="mono" x="655" y="340">clock-frequency = &lt;27000000&gt;</text>
  <text class="cap" x="655" y="360" text-anchor="middle">match the on-board MGTREFCLK osc</text>

  <!-- clock edge -->
  <path class="edge" d="M490,330 C430,330 400,351 342,351" marker-end="url(#arr2)"/>
  <text class="cap" x="415" y="322" text-anchor="middle">feeds ref0</text>

  <text class="cap" x="40" y="416" font-size="11">Green = nodes/properties you add · gray = generated by the device-tree generator. Do NOT override <tspan font-family="Consolas,Menlo,monospace">phys</tspan> / <tspan font-family="Consolas,Menlo,monospace">phy-names</tspan>.</text>
</svg>
