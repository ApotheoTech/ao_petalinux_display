<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 660" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .neutral{fill:#f1f5f9;stroke:#475569;stroke-width:1.6;}
      .proc{fill:#eef2ff;stroke:#4f46e5;stroke-width:1.6;}
      .end{fill:#dcfce7;stroke:#15803d;stroke-width:2;}
      .tb{fill:#0f172a;font-size:14px;font-weight:700;text-anchor:middle;}
      .t{fill:#0f172a;font-size:13px;text-anchor:middle;}
      .sub{fill:#475569;font-size:11px;text-anchor:middle;}
      .mono{fill:#3730a3;font-size:11px;font-family:Consolas,Menlo,monospace;text-anchor:middle;}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <text x="300" y="30" class="tb" font-size="15">PetaLinux boot flow (SD)</text>

  <rect class="neutral" x="150" y="48" width="300" height="48" rx="24"/>
  <text class="tb" x="300" y="70">Power on · SD1-LS</text>
  <text class="sub" x="300" y="86">BOOT_MODE[3:0] = 1110</text>
  <line class="edge" x1="300" y1="96" x2="300" y2="120" marker-end="url(#arrb)"/>

  <rect class="neutral" x="110" y="122" width="380" height="58" rx="10"/>
  <text class="tb" x="300" y="145">BOOT.BIN</text>
  <text class="sub" x="300" y="164">FSBL · PMUFW · ATF · U-Boot · bitstream</text>
  <line class="edge" x1="300" y1="180" x2="300" y2="204" marker-end="url(#arrb)"/>

  <rect class="proc" x="110" y="206" width="380" height="58" rx="10"/>
  <text class="tb" x="300" y="229">U-Boot → boot.scr</text>
  <text class="mono" x="300" y="248">fatload mmc 1:1 image.ub · bootm</text>
  <line class="edge" x1="300" y1="264" x2="300" y2="288" marker-end="url(#arrb)"/>

  <rect class="proc" x="110" y="290" width="380" height="58" rx="10"/>
  <text class="tb" x="300" y="313">image.ub  (FIT)</text>
  <text class="sub" x="300" y="332">Linux kernel + device tree (DTB)</text>
  <line class="edge" x1="300" y1="348" x2="300" y2="372" marker-end="url(#arrb)"/>

  <rect class="proc" x="110" y="374" width="380" height="58" rx="10"/>
  <text class="tb" x="300" y="397">root = /dev/mmcblk1p2</text>
  <text class="sub" x="300" y="416">ext4 · PetaLinux rootfs (p2)</text>
  <line class="edge" x1="300" y1="432" x2="300" y2="456" marker-end="url(#arrb)"/>

  <rect class="proc" x="110" y="458" width="380" height="58" rx="10"/>
  <text class="tb" x="300" y="481">zynqmp-dpsub + psgtr</text>
  <text class="sub" x="300" y="500">DP lanes trained · /dev/dri/card0</text>
  <line class="edge" x1="300" y1="516" x2="300" y2="540" marker-end="url(#arrb)"/>

  <rect class="end" x="110" y="542" width="380" height="58" rx="29"/>
  <text class="tb" x="300" y="565">X11 + matchbox desktop</text>
  <text class="sub" x="300" y="584">out the PS DisplayPort → monitor</text>

  <text class="sub" x="300" y="636" font-size="10.5">boot.scr is required — image.ub does not auto-boot</text>
</svg>
