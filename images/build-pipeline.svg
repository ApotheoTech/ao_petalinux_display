<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .stage{fill:#eef2ff;stroke:#4f46e5;stroke-width:1.6;}
      .art{fill:#ecfeff;stroke:#0891b2;stroke-width:1.6;}
      .end{fill:#dcfce7;stroke:#15803d;stroke-width:2;}
      .t{fill:#0f172a;font-size:13px;font-weight:700;text-anchor:middle;}
      .s{fill:#475569;font-size:10.5px;text-anchor:middle;}
      .sec{fill:#6366f1;font-size:10px;font-weight:700;text-anchor:middle;}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <text x="20" y="28" font-size="15" font-weight="700" fill="#0f172a">Build pipeline — Vivado → PetaLinux → SD</text>

  <!-- row of stages -->
  <g>
    <rect class="stage" x="20" y="58" width="150" height="64" rx="9"/>
    <text class="sec" x="95" y="76">§2</text>
    <text class="t" x="95" y="94">Vivado</text>
    <text class="s" x="95" y="111">block design → bitstream</text>

    <rect class="art" x="196" y="58" width="120" height="64" rx="9"/>
    <text class="t" x="256" y="86">.xsa</text>
    <text class="s" x="256" y="104">hardware handoff</text>

    <rect class="stage" x="342" y="58" width="170" height="64" rx="9"/>
    <text class="sec" x="427" y="76">§3 · §4</text>
    <text class="t" x="427" y="94">petalinux-create</text>
    <text class="s" x="427" y="111">+ config (kernel/rootfs/DT)</text>

    <rect class="stage" x="538" y="58" width="160" height="64" rx="9"/>
    <text class="sec" x="618" y="76">§5 · §6</text>
    <text class="t" x="618" y="94">petalinux-build</text>
    <text class="s" x="618" y="111">+ package --boot</text>

    <rect class="art" x="724" y="58" width="216" height="64" rx="9"/>
    <text class="t" x="832" y="86">BOOT.BIN · image.ub · boot.scr</text>
    <text class="s" x="832" y="104">+ rootfs.tar.gz</text>
  </g>

  <line class="edge" x1="170" y1="90" x2="194" y2="90" marker-end="url(#arr)"/>
  <line class="edge" x1="316" y1="90" x2="340" y2="90" marker-end="url(#arr)"/>
  <line class="edge" x1="512" y1="90" x2="536" y2="90" marker-end="url(#arr)"/>
  <line class="edge" x1="698" y1="90" x2="722" y2="90" marker-end="url(#arr)"/>

  <!-- down to SD -->
  <line class="edge" x1="832" y1="122" x2="832" y2="158" marker-end="url(#arr)"/>
  <rect class="end" x="724" y="160" width="216" height="56" rx="9"/>
  <text class="sec" x="832" y="178" fill="#15803d">§7 · §8 · §9</text>
  <text class="t" x="832" y="196">SD card → boot → desktop on DP</text>
  <text class="s" x="832" y="210">FAT32 boot · ext4 rootfs</text>
</svg>
