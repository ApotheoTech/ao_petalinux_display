<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 660" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .box{rx:10;ry:10;stroke-width:1.6;}
      .neutral{fill:#f1f5f9;stroke:#475569;}
      .dec{fill:#fff7ed;stroke:#ea580c;stroke-width:1.8;}
      .a{fill:#e6f2ff;stroke:#3b82f6;}
      .b{fill:#e8f8ee;stroke:#16a34a;}
      .pillA{fill:#dbeafe;stroke:#2563eb;stroke-width:2;}
      .pillB{fill:#dcfce7;stroke:#15803d;stroke-width:2;}
      .t{fill:#0f172a;font-size:13px;text-anchor:middle;}
      .tb{fill:#0f172a;font-size:14px;font-weight:700;text-anchor:middle;}
      .sub{fill:#475569;font-size:11.5px;text-anchor:middle;}
      .lbl{fill:#475569;font-size:11.5px;font-weight:600;}
      .ta{fill:#0b2545;}
      .tbb{fill:#06351b;}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;}
    </style>
  </defs>

  <!-- start -->
  <rect class="box neutral" x="330" y="20" width="260" height="44" rx="22" ry="22"/>
  <text class="tb" x="460" y="47">Power on · SD boot</text>
  <line class="edge" x1="460" y1="64" x2="460" y2="96" marker-end="url(#arrow)"/>

  <!-- BOOT.BIN -->
  <rect class="box neutral" x="250" y="98" width="420" height="58"/>
  <text class="tb" x="460" y="121">BOOT.BIN</text>
  <text class="sub" x="460" y="140">FSBL · psu_init · PMUFW · ATF · U-Boot</text>
  <line class="edge" x1="460" y1="156" x2="460" y2="184" marker-end="url(#arrow)"/>

  <!-- decision -->
  <rect class="box dec" x="300" y="186" width="320" height="50"/>
  <text class="tb" x="460" y="216">boot.scr.uimg — which one runs?</text>

  <!-- branch edges -->
  <path class="edge" d="M360,236 C300,270 250,272 230,294" marker-end="url(#arrow)"/>
  <path class="edge" d="M560,236 C620,270 670,272 690,294" marker-end="url(#arrow)"/>
  <text class="lbl" x="150" y="270">Option A · stock script</text>
  <text class="lbl" x="612" y="270">Option B · your script</text>

  <!-- Option A column (blue) -->
  <rect class="box a" x="80" y="296" width="300" height="56"/>
  <text class="t ta" x="230" y="319" font-weight="700">image.fit</text>
  <text class="sub" x="230" y="338">Ubuntu 6.8 kernel + ramdisk</text>
  <line class="edge" x1="230" y1="352" x2="230" y2="378" marker-end="url(#arrow)"/>

  <rect class="box a" x="80" y="380" width="300" height="44"/>
  <text class="t ta" x="230" y="407">+ user-override.dtb</text>
  <line class="edge" x1="230" y1="424" x2="230" y2="450" marker-end="url(#arrow)"/>

  <rect class="box a" x="80" y="452" width="300" height="56"/>
  <text class="t ta" x="230" y="475" font-weight="700">root=LABEL=writable</text>
  <text class="sub" x="230" y="494">p2 · Ubuntu rootfs</text>
  <line class="edge" x1="230" y1="508" x2="230" y2="534" marker-end="url(#arrow)"/>

  <rect class="box pillA" x="80" y="536" width="300" height="48" rx="24" ry="24"/>
  <text class="tb ta" x="230" y="565">Terminal + SSH · no DisplayPort</text>

  <!-- Option B column (green) -->
  <rect class="box b" x="540" y="296" width="300" height="56"/>
  <text class="t tbb" x="690" y="319" font-weight="700">Image</text>
  <text class="sub" x="690" y="338">PetaLinux vendor kernel</text>
  <line class="edge" x1="690" y1="352" x2="690" y2="378" marker-end="url(#arrow)"/>

  <rect class="box b" x="540" y="380" width="300" height="44"/>
  <text class="t tbb" x="690" y="407">+ user-override.dtb</text>
  <line class="edge" x1="690" y1="424" x2="690" y2="450" marker-end="url(#arrow)"/>

  <rect class="box b" x="540" y="452" width="300" height="56"/>
  <text class="t tbb" x="690" y="475" font-weight="700">root=/dev/mmcblk1p2</text>
  <text class="sub" x="690" y="494">p2 · Ubuntu rootfs + injected modules</text>
  <line class="edge" x1="690" y1="508" x2="690" y2="534" marker-end="url(#arrow)"/>

  <rect class="box pillB" x="540" y="536" width="300" height="48" rx="24" ry="24"/>
  <text class="tb tbb" x="690" y="565">Desktop + DisplayPort</text>

  <text class="sub" x="460" y="630" font-size="11">Blue = Option A (Ubuntu kernel) · Green = Option B (vendor kernel)</text>
</svg>
